<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>

<body>
      <main class="page" id="chats">
      <div class="chat-list">
        <div class="chat-list-header">
          <div class="chat-list-header-top">
            <div class="chat-list-brand">
              <div class="page-header-left">
                <h1>Support</h1>
                <p>Support, Admin chat panel </p>
              </div>
            </div>
            <div class="chat-list-header-actions">
              <button class="icon-btn" onclick="toggleSort()" title="Sort" id="sortBtn"><i class="ri-sort-desc"></i></button>
              <button class="icon-btn" title="New conversation" onclick="toast('Feature coming soon', 'warning')"><i class="ri-add-line"></i></button>
            </div>
          </div>
          
          <div class="search-bar-wrap">
            <i class="ri-search-line search-bar-icon"></i>
            <input type="text" class="search-bar" id="chatSearch" placeholder="Search by name or message..." oninput="handleChatSearch(this.value)" autocomplete="off">
            <button class="search-clear" id="searchClearBtn" onclick="clearChatSearch()" title="clear">✕</button>
          </div>
        </div>
        
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All <span class="tab-badge" id="badge-all">5</span></button>
          <button class="filter-tab" onclick="setFilter('unread', this)">Unread <span class="tab-badge" id="badge-unread">3</span></button>
          <button class="filter-tab" onclick="setFilter('open', this)">Open</button>
          <button class="filter-tab" onclick="setFilter('resolved', this)">Resolved</button>
          <button class="filter-tab" onclick="setFilter('pinned', this)">Pinned</button>
        </div>
        
        
        <!---
      <div id="chatLayout" class="table-container">
        
        <!-- Session List -->
        <div class="chat-list" id="chatSessionList">
          <div id="chatSessionItems">
            <div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">Loading chats...</div>
          </div>
          <!--        <!-- Chat list --
        <div class="chat-list" id="chatList"></div>-->
        </div>
        
        
        
        
        
        <div class="no-chats" id="noChats">
          <i class="ri-search-2-line"></i>
          No chats found
        </div>
        
        <!-- Stats footer -->
        <div class="chat-list-footer">
          <div class="sf-stat">
            <span class="sf-stat-val" id="stat-open">8</span>
            <span class="sf-stat-label">Open</span>
          </div>
          <div class="sf-divider"></div>
          <div class="sf-stat">
            <span class="sf-stat-val" id="stat-unread">3</span>
            <span class="sf-stat-label">Unread</span>
          </div>
          <div class="sf-divider"></div>
          <div class="sf-stat">
            <span class="sf-stat-val" id="stat-resolved">24</span>
            <span class="sf-stat-label">Resolved</span>
          </div>
        </div>
      </div>
      
      
      <!-- ════════════════ MAIN CHAT ════════════════ -->
      <div class="chat-main" style="display: none" id="chatWindow">
        <!-- Empty state -->
        <div class="chat-empty" id="chatWindowEmpty">
          <i class="ri-message-3-line"></i>
          <h3>Select a conversation</h3>
          <p>Choose a chat from the list to start supporting your users</p>
        </div>
        
        
        <!-- Active chat -->
        <div id="chatWindowActive" style="display:none;flex-direction:column;height:100%;">
          
          <!-- ── Chat Header ─────────────────────────────── -->
          <div id="adminChatHeader" style="padding:10px 8px;border-bottom:1px solid var(--border,#e0e5f2);display:flex;align-items:center;gap:10px;">
            
            <!-- Back button — mobile only -->
            <button id="chatBackBtn" onclick="closeChatOnMobile()" title="Back to chats" style="display:none;align-items:center;justify-content:center;width:32px;height:32px;border:none;border-radius:8px;background:transparent;color:var(--primary);cursor:pointer;flex-shrink:0;">
              <i class="ri-arrow-left-line" style="font-size:20px;"></i>
            </button>
            
            <!-- Avatar — clickable → user profile -->
            <img id="adminChatUserLogo" src="" title="View profile" onclick="openChatUserProfile()" style="width:40px;height:40px;border-radius:50%;object-fit:cover;background:#eee;cursor:pointer;border:2px solid var(--primary);flex-shrink:0;">
            
            <!-- Name + ticker -->
            <div style="flex:1;min-width:0;cursor:pointer;" onclick="openChatUserProfile()">
              <div id="adminChatUsername" style="font-weight:700;font-size:14px;color:var(--text-main);line-height:1.3;"></div>
              <div id="adminChatSessionStatus" style="font-size:10px;color:#aaa;transition:opacity 0.4s;line-height:1.3;"></div>
            </div>
            
            <!-- Action icon buttons -->
            <div style="display:flex;align-items:center;gap:2px;">
              
              <!-- Block / Unblock -->
              <button id="adminBlockBtn" onclick="toggleBlockFromChat()" title="Block user" style="display:flex;align-items:center;gap:4px;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:600;background:#fdecea;color:#e74c3c;">
                <i class="ri-forbid-line" style="font-size:15px;"></i>
                <span id="adminBlockLabel">Block</span>
              </button>
              
              <!-- Search -->
              <button onclick="toggleChatSearch()" title="Search messages" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:none;border-radius:8px;background:transparent;color:var(--text-muted,#aaa);cursor:pointer;">
                <i class="ri-search-line" style="font-size:18px;"></i>
              </button>
              
              <!-- End session -->
              <button onclick="endAdminChatSession()" style="display:none;" title="End session" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:none;border-radius:8px;background:transparent;color:#f39c12;cursor:pointer;">
                <i class="ri-stop-circle-line" style="font-size:18px;"></i>
              </button>
              
              <!-- Delete chat -->
              <button onclick="deleteAdminChatSession()" title="Delete chat" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:none;border-radius:8px;background:transparent;color:#e74c3c;cursor:pointer;">
                <i class="ri-delete-bin-line" style="font-size:18px;"></i>
              </button>
            </div>
          </div>
          
          <!-- ── Search Bar ───────────────────────────────── -->
          <div id="chatSearchBar" style="display:none;padding:8px 14px;background:var(--bg-color,#f4f7fe);border-bottom:1px solid var(--border,#e0e5f2);">
            <div style="display:flex;align-items:center;gap:8px;background:var(--card-bg,#fff);border:1px solid var(--border,#e0e5f2);border-radius:20px;padding:0 14px;">
              <i class="ri-search-line" style="color:#aaa;font-size:16px;flex-shrink:0;"></i>
              <input type="text" id="chatSearchInput" placeholder="Search messages..." oninput="searchChatMessages(this.value)" style="flex:1;border:none;outline:none;padding:8px 0;font-size:13px;background:transparent;">
              <i class="ri-close-line" onclick="toggleChatSearch()" style="color:#aaa;font-size:18px;cursor:pointer;flex-shrink:0;"></i>
            </div>
            <div id="chatSearchResults" style="margin-top:5px;font-size:12px;padding-left:4px;"></div>
          </div>
          
          <!-- ── Messages ─────────────────────────────────── -->
          <div id="adminChatMessages" style="flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:4px;"></div>
          
          <!-- ── Typing Indicator ─────────────────────────── -->
          <div id="adminTypingIndicator" style="display:none;padding:6px 16px;align-items:center;gap:8px;background:var(--bg-color,#f4f7fe);">
            <i class="ri-more-line" style="color:#aaa;font-size:16px;"></i>
            <span style="font-size:12px;color:#aaa;">User is typing</span>
            <span style="display:flex;gap:3px;align-items:center;">
              <span style="width:5px;height:5px;background:#bbb;border-radius:50%;animation:typingDot 1.2s infinite 0s;display:inline-block;"></span>
              <span style="width:5px;height:5px;background:#bbb;border-radius:50%;animation:typingDot 1.2s infinite 0.2s;display:inline-block;"></span>
              <span style="width:5px;height:5px;background:#bbb;border-radius:50%;animation:typingDot 1.2s infinite 0.4s;display:inline-block;"></span>
            </span>
          </div>
          
          <!-- ── Reply / Edit Bar ─────────────────────────── -->
          <div id="adminReplyBar" style="display:none;padding:8px 14px;background:var(--card-bg,#fff);border-top:2px solid var(--primary);flex-direction:row;align-items:center;gap:10px;">
            <i class="ri-reply-line" style="color:var(--primary);font-size:18px;flex-shrink:0;"></i>
            <div style="flex:1;min-width:0;">
              <div id="adminReplyBarSender" style="font-size:11px;font-weight:700;color:var(--primary);"></div>
              <div id="adminReplyBarText" style="font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
            </div>
            <button onclick="cancelAdminReply()" style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:none;border-radius:50%;background:rgba(0,0,0,0.06);cursor:pointer;flex-shrink:0;">
              <i class="ri-close-line" style="font-size:15px;color:#888;"></i>
            </button>
          </div>
          
          <!-- ── Polar Question Input ─────────────────────── -->
          <div id="polarInputArea" style="display:none;padding:10px 8px;background:#fffde7;border-top:2px solid #f1c40f;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
              <i class="ri-questionnaire-line" style="color:#f39c12;font-size:16px;"></i>
              <span style="font-size:12px;color:#888;font-weight:600;">Polar Question — user answers Yes or No</span>
            </div>
            <div style="display:flex;gap:8px;">
              <input type="text" id="polarQuestionInput" placeholder="e.g. Did you complete the transfer?" style="flex:1;padding:8px 12px;border:1px solid var(--border,#e0e5f2);border-radius:8px;font-size:13px;outline:none;">
              <button onclick="sendAdminPolar()" style="display:flex;align-items:center;gap:5px;background:#f1c40f;color:#333;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600;">
                <i class="ri-send-plane-line" style="font-size:14px;"></i> Send
              </button>
              <button onclick="togglePolarInput()" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:#eee;border:none;border-radius:8px;cursor:pointer;">
                <i class="ri-close-line" style="font-size:17px;color:#666;"></i>
              </button>
            </div>
          </div>
          
          <!-- ── Input Bar ────────────────────────────────── -->
          <div id="adminChatInputBar" style="padding:10px 14px;border-top:1px solid var(--border,#e0e5f2);display:flex;align-items:center;gap:8px;">
            <label for="adminImgInput" title="Send image" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;cursor:pointer;color:var(--text-muted,#aaa);flex-shrink:0;transition:color 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted,#aaa)'">
              <i class="ri-image-2-line" style="font-size:20px;"></i>
              <input type="file" id="adminImgInput" accept="image/*" style="display:none;" onchange="sendAdminImage(this)">
            </label>
            <!-- Polar question -->
            <button id="adminPolarBtn" onclick="togglePolarInput()" title="Send polar question" style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:none;border-radius:8px;background:transparent;color:var(--primary);cursor:pointer;">
              <i class="ri-questionnaire-line" style="font-size:18px;"></i>
            </button>
            
            <input type="text" id="adminChatInput" placeholder="Type a reply..." maxlength="500" style="flex:1;border:1px solid var(--border,#e0e5f2);border-radius:20px;padding:9px 15px;font-size:14px;outline:none;;color:var(--text-main);" onkeydown="onAdminInputKeydown(event)">
            <button onclick="sendAdminMessage()" title="Send" style="display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:none;border-radius:50%;background:var(--primary,#4318ff);cursor:pointer;flex-shrink:0;">
              <i class="ri-send-plane-fill" style="color:#fff;font-size:17px;"></i>
            </button>
          </div>
          
          <!--- <style>
            @keyframes typingDot {
              
              0%,
              60%,
              100% {
                transform: translateY(0)
              }
              
              30% {
                transform: translateY(-5px)
              }
            }
            
            #adminChatHeader button:hover {
              opacity: 0.8;
            }
          </style>--->
        </div>
        
      </div>
    </main>

</body>

</html>
