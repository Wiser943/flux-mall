<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transactions — Flux Mall Admin</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
  /* ── FLUX MALL DESIGN TOKENS ───────────────────────────── */
  :root {
    --primary:      #4318ff;
    --primary-soft: rgba(67,24,255,0.10);
    --accent:       #868cff;
    --success:      #05cd99;
    --success-soft: rgba(5,205,153,0.12);
    --danger:       #ee5d50;
    --danger-soft:  rgba(238,93,80,0.12);
    --warning:      #f6ad55;
    --warning-soft: rgba(246,173,85,0.12);
    --blue:         #4299e1;
    --blue-soft:    rgba(66,153,225,0.12);
    --bg:           #f4f7fe;
    --card:         #ffffff;
    --border:       #e0e5f2;
    --text1:        #1b2559;
    --text2:        #4a5568;
    --text3:        #a3adc2;
    --shadow:       0 4px 24px rgba(67,24,255,0.08);
    --shadow-sm:    0 2px 8px rgba(0,0,0,0.06);
    --radius:       16px;
    --radius-sm:    10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
  }

  /* ── LAYOUT ────────────────────────────────────────────── */
  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  /* ── PAGE HEADER ───────────────────────────────────────── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .page-header h1 {
    font-size: 20px;
    font-weight: 800;
    color: var(--text1);
    letter-spacing: -0.3px;
  }
  .page-header .subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── STAT STRIP ────────────────────────────────────────── */
  .stat-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 14px 14px 12px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 3px 3px 0 0;
  }
  .stat-card.blue::before  { background: var(--primary); }
  .stat-card.green::before { background: var(--success); }
  .stat-card.orange::before{ background: var(--warning); }
  .stat-card.red::before   { background: var(--danger); }
  .stat-val {
    font-size: 18px;
    font-weight: 800;
    color: var(--text1);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text3);
  }
  .stat-icon {
    position: absolute;
    top: 12px; right: 12px;
    font-size: 20px;
    opacity: 0.18;
  }

  /* ── TABS ──────────────────────────────────────────────── */
  .tabs-wrap {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .tabs-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    padding: 6px 6px 0;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 6px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--text3);
    cursor: pointer;
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.18s;
    position: relative;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--primary);
    box-shadow: 0 -2px 0 var(--primary) inset;
  }
  .tab-btn .tab-count {
    background: var(--primary-soft);
    color: var(--primary);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
  }
  .tab-btn.active .tab-count { background: var(--primary); color: #fff; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── TOOLBAR ───────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 160px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .search-box i { color: var(--text3); font-size: 15px; }
  .search-box input {
    border: none;
    background: transparent;
    font-size: 13px;
    color: var(--text1);
    outline: none;
    width: 100%;
  }
  .filter-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text2);
    outline: none;
    cursor: pointer;
  }

  /* ── TABLE ─────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--bg);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(67,24,255,0.02); }
  tbody td {
    padding: 11px 14px;
    vertical-align: middle;
  }

  /* ── BADGES ────────────────────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .badge.success, .badge.approved { background: var(--success-soft); color: var(--success); }
  .badge.pending                  { background: var(--warning-soft); color: var(--warning); }
  .badge.declined, .badge.failed  { background: var(--danger-soft);  color: var(--danger); }
  .badge.blue                     { background: var(--blue-soft);    color: var(--blue); }

  /* ── ACTION BUTTONS ────────────────────────────────────── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary   { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #3410d9; }
  .btn-success   { background: var(--success-soft); color: var(--success); }
  .btn-success:hover { background: var(--success); color: #fff; }
  .btn-danger    { background: var(--danger-soft); color: var(--danger); }
  .btn-danger:hover  { background: var(--danger); color: #fff; }
  .btn-ghost     { background: transparent; color: var(--text3); border: 1px solid var(--border); }
  .btn-ghost:hover   { background: var(--bg); color: var(--text2); }
  .btn-sm { padding: 5px 9px; font-size: 11px; }
  .action-group { display: flex; gap: 5px; align-items: center; }

  /* ── EMPTY / LOADING STATES ────────────────────────────── */
  .state-box {
    text-align: center;
    padding: 50px 20px;
    color: var(--text3);
  }
  .state-box i { font-size: 36px; opacity: 0.4; display: block; margin-bottom: 10px; }
  .state-box p { font-size: 13px; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MODAL ─────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(17,24,39,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 999;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal-sheet {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 560px;
    padding: 0 0 32px;
    animation: slideUp 0.22s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 92vh;
    overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 12px auto 0;
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-head h3 { font-size: 15px; font-weight: 700; color: var(--text1); }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--text3); cursor: pointer; padding: 4px; }
  .modal-body { padding: 18px 20px; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .modal-row label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; display: block; }
  .modal-row .val { font-size: 14px; font-weight: 600; color: var(--text1); }
  .info-card { background: var(--bg); border-radius: 10px; padding: 12px 14px; flex: 1; }
  .modal-footer { display: flex; gap: 8px; padding: 0 20px; }
  .modal-footer .btn { flex: 1; justify-content: center; }

  /* ── USER AVATAR CHIP ──────────────────────────────────── */
  .user-chip { display: flex; align-items: center; gap: 7px; }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }
  .username { font-size: 12px; font-weight: 600; color: var(--text1); }
  .user-id  { font-size: 10px; color: var(--text3); font-family: monospace; }

  /* ── AMOUNT CELL ───────────────────────────────────────── */
  .amt-fex   { font-size: 13px; font-weight: 700; color: var(--text1); }
  .amt-naira { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* ── PAGINATION ────────────────────────────────────────── */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text3);
    flex-wrap: wrap;
    gap: 8px;
  }
  .page-btns { display: flex; gap: 4px; }
  .page-btns button {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    font-size: 12px;
    cursor: pointer;
    color: var(--text2);
    font-weight: 600;
    transition: all 0.12s;
  }
  .page-btns button.active,
  .page-btns button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
  .page-btns button:disabled { opacity: 0.4; pointer-events: none; }

  /* ── BANK DETAIL ROW ───────────────────────────────────── */
  .bank-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--primary-soft);
    color: var(--primary);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
  }

  /* ── RESPONSIVE ────────────────────────────────────────── */
  @media (max-width: 600px) {
    .stat-strip { grid-template-columns: repeat(2, 1fr); }
    .stat-val { font-size: 15px; }
    thead th:nth-child(3),
    thead th:nth-child(4),
    tbody td:nth-child(3),
    tbody td:nth-child(4) { display: none; }
    .page-header h1 { font-size: 17px; }
  }
  @media (max-width: 400px) {
    .tab-btn span { display: none; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- ── PAGE HEADER ───────────────────────────────────── -->
  <div class="page-header">
    <div>
      <h1><i class="ri-exchange-funds-line" style="color:var(--primary);margin-right:6px;"></i>Transactions</h1>
      <div class="subtitle">Deposits · Withdrawals · Activity log</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()"><i class="ri-refresh-line"></i> Refresh</button>
      <button class="btn btn-primary btn-sm" onclick="exportAllCSV()"><i class="ri-download-2-line"></i> Export</button>
    </div>
  </div>

  <!-- ── STAT STRIP ────────────────────────────────────── -->
  <div class="stat-strip">
    <div class="stat-card blue">
      <div class="stat-val" id="statTotalDeposits">—</div>
      <div class="stat-label">Total Deposits</div>
      <i class="ri-arrow-down-circle-line stat-icon"></i>
    </div>
    <div class="stat-card green">
      <div class="stat-val" id="statApprovedDeposits">—</div>
      <div class="stat-label">Approved</div>
      <i class="ri-checkbox-circle-line stat-icon"></i>
    </div>
    <div class="stat-card orange">
      <div class="stat-val" id="statPendingDeposits">—</div>
      <div class="stat-label">Pending</div>
      <i class="ri-time-line stat-icon"></i>
    </div>
    <div class="stat-card red">
      <div class="stat-val" id="statTotalWithdrawals">—</div>
      <div class="stat-label">Withdrawals</div>
      <i class="ri-arrow-up-circle-line stat-icon"></i>
    </div>
  </div>

  <!-- ── TABS CONTAINER ────────────────────────────────── -->
  <div class="tabs-wrap">

    <!-- Tab Buttons -->
    <div class="tabs-header">
      <button class="tab-btn active" onclick="switchTab('deposits',this)">
        <i class="ri-arrow-down-circle-line"></i>
        <span>Deposits</span>
        <span class="tab-count" id="tcDeposits">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('withdrawals',this)">
        <i class="ri-arrow-up-circle-line"></i>
        <span>Withdrawals</span>
        <span class="tab-count" id="tcWithdrawals">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('activity',this)">
        <i class="ri-list-check"></i>
        <span>Activity</span>
        <span class="tab-count" id="tcActivity">0</span>
      </button>
    </div>

    <!-- ══ DEPOSITS TAB ══════════════════════════════════ -->
    <div class="tab-panel active" id="panel-deposits">
      <div class="toolbar">
        <div class="search-box">
          <i class="ri-search-line"></i>
          <input type="text" placeholder="Search user, ref…" oninput="filterDeposits(this.value)">
        </div>
        <select class="filter-select" onchange="filterDepositStatus(this.value)">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="success">Approved</option>
          <option value="declined">Declined</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Amount</th>
              <th>Reference</th>
              <th>Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="depositTableBody">
            <tr><td colspan="6"><div class="state-box"><div class="spinner"></div><p>Loading…</p></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="depositPagination" style="display:none;">
        <span id="depositPageInfo"></span>
        <div class="page-btns" id="depositPageBtns"></div>
      </div>
    </div>

    <!-- ══ WITHDRAWALS TAB ════════════════════════════════ -->
    <div class="tab-panel" id="panel-withdrawals">
      <div class="toolbar">
        <div class="search-box">
          <i class="ri-search-line"></i>
          <input type="text" placeholder="Search user, account…" oninput="filterWithdrawals(this.value)">
        </div>
        <select class="filter-select" onchange="filterWithdrawalStatus(this.value)">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="success">Paid</option>
          <option value="declined">Declined</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Amount (FEX)</th>
              <th>Naira Value</th>
              <th>Bank Details</th>
              <th>Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="withdrawTableBody">
            <tr><td colspan="7"><div class="state-box"><div class="spinner"></div><p>Loading…</p></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="withdrawPagination" style="display:none;">
        <span id="withdrawPageInfo"></span>
        <div class="page-btns" id="withdrawPageBtns"></div>
      </div>
    </div>

    <!-- ══ ACTIVITY TAB ═══════════════════════════════════ -->
    <div class="tab-panel" id="panel-activity">
      <div class="toolbar">
        <div class="search-box">
          <i class="ri-search-line"></i>
          <input type="text" placeholder="Search description, type…" oninput="filterActivity(this.value)">
        </div>
        <select class="filter-select" onchange="filterActivityType(this.value)">
          <option value="all">All Types</option>
          <option value="Deposit">Deposit</option>
          <option value="Withdrawal">Withdrawal</option>
          <option value="Check-in">Check-in</option>
          <option value="Shares">Investment</option>
          <option value="Won spin">Spin Win</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Description</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="activityTableBody">
            <tr><td colspan="5"><div class="state-box"><div class="spinner"></div><p>Loading…</p></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="activityPagination" style="display:none;">
        <span id="activityPageInfo"></span>
        <div class="page-btns" id="activityPageBtns"></div>
      </div>
    </div>

  </div><!-- /tabs-wrap -->
</div><!-- /page -->

<!-- ── DETAIL MODAL (shared) ─────────────────────────── -->
<div id="txnModal" style="display:none;"></div>

<script>
// ═══════════════════════════════════════════════════════════
// FLUX MALL — Admin Transactions Page
// APIs: /api/admin/deposits  /api/admin/withdrawals
//       /api/admin/activity  (GET all users activity)
// ═══════════════════════════════════════════════════════════

// ── STATE ──────────────────────────────────────────────────
let _deposits    = [];
let _withdrawals = [];
let _activity    = [];

let _dFiltered = [], _wFiltered = [], _aFiltered = [];

const PER_PAGE = 15;
let dPage = 1, wPage = 1, aPage = 1;

// ── AVATAR COLOR MAP ───────────────────────────────────────
const COLORS = ['#4318ff','#05cd99','#ee5d50','#f6ad55','#4299e1','#9f7aea','#ed64a6','#38b2ac'];
function avatarColor(str) {
  let h = 0;
  for (let i = 0; i < (str||'').length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(str) { return (str || '?').slice(0,2).toUpperCase(); }

// ── API HELPER ─────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    const res = await fetch(path, {
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts
    });
    return res.json();
  } catch (e) {
    console.error('[API]', e);
    return null;
  }
}

// ── TAB SWITCH ─────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── INIT ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadDeposits();
  loadWithdrawals();
  loadActivity();
});

async function refreshAll() {
  loadDeposits();
  loadWithdrawals();
  loadActivity();
}

// ═══════════════════════════════════════════════════════════
// DEPOSITS
// ═══════════════════════════════════════════════════════════
async function loadDeposits() {
  setLoading('depositTableBody', 6);
  const data = await api('/api/admin/deposits');
  if (!data?.success) { setError('depositTableBody', 6, 'Failed to load deposits'); return; }
  _deposits  = data.deposits || [];
  _dFiltered = [..._deposits];
  updateDepositStats();
  renderDepositsPage();
}

function updateDepositStats() {
  const total    = _deposits.length;
  const approved = _deposits.filter(d => d.status === 'success').length;
  const pending  = _deposits.filter(d => d.status === 'pending').length;
  const withdrawCount = _withdrawals.length;

  setText('statTotalDeposits',    total);
  setText('statApprovedDeposits', approved);
  setText('statPendingDeposits',  pending);
  setText('statTotalWithdrawals', withdrawCount);
  setText('tcDeposits',           total);
}

function filterDeposits(term) {

// EXPORT CSV
// ═══════════════════════════════════════════════════════════
function exportAllCSV() {
  // Determine which tab is active
  const active = document.querySelector('.tab-panel.active')?.id;
  let rows = [], headers = [], name = '';

  if (active === 'panel-deposits') {
    headers = ['Date','User','Amount FEX','Ref','Status','Method'];
    rows = _dFiltered.map(d => [
      d.createdAt ? new Date(d.createdAt).toLocaleDateString() : '',
      d.userId?.username || d.userId || '',
      d.amount, d.refCode, d.status, d.method || 'Bank Transfer'
    ]);
    name = 'deposits';
  } else if (active === 'panel-withdrawals') {
    headers = ['Date','User','FEX','Naira','Bank','Account','Status'];
    rows = _wFiltered.map(w => [
      w.createdAt ? new Date(w.createdAt).toLocaleDateString() : '',
      w.username || '',
      w.amount, w.netAmount,
      w.bankDetails?.bankName || '', w.bankDetails?.accountNumber || '',
      w.status
    ]);
    name = 'withdrawals';
  } else {
    headers = ['Date','User','Type','Amount FEX','Description'];
    rows = _aFiltered.map(a => [
      a.createdAt ? new Date(a.createdAt).toLocaleDateString() : '',
      a.userId?.username || '',
      a.type, a.amount, a.desc
    ]);
    name = 'activity';
  }

  const csv  = [headers, ...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `fluxmall_${name}_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('CSV exported ✓', 'success');
}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function statusBadge(s) {
  const map = {
    success:  'success', approved: 'success',
    pending:  'pending',
    declined: 'declined', failed: 'declined'
  };
  const cls = map[s] || 'pending';
  const dot = { success:'🟢', pending:'🟡', declined:'🔴' }[cls] || '⚪';
  return `<span class="badge ${cls}">${dot} ${(s||'pending').charAt(0).toUpperCase() + (s||'pending').slice(1)}</span>`;
}

function paginate(arr, page, per) {
  const start = (page-1)*per;
  return arr.slice(start, start+per);
}

function renderPagination(prefix, total, page, onPage) {
  const totalPages = Math.ceil(total / PER_PAGE);
  const start = (page-1)*PER_PAGE + 1;
  const end   = Math.min(page*PER_PAGE, total);
  const wrap  = document.getElementById(prefix+'Pagination');
  const info  = document.getElementById(prefix+'PageInfo');
  const btns  = document.getElementById(prefix+'PageBtns');
  if (!wrap) return;

  if (totalPages <= 1) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  if (info) info.textContent = `${start}–${end} of ${total}`;

  // Build page buttons
  const range = [];
  let s = Math.max(1, page - 2);
  let e = Math.min(totalPages, s + 4);
  if (e-s < 4) s = Math.max(1, e-4);
  for (let i = s; i <= e; i++) range.push(i);

  btns.innerHTML = `
    <button ${page<=1?'disabled':''} onclick="(${onPage.toString()})(${page-1})"><i class="ri-arrow-left-s-line"></i></button>
    ${range.map(p => `<button class="${p===page?'active':''}" onclick="(${onPage.toString()})(${p})">${p}</button>`).join('')}
    <button ${page>=totalPages?'disabled':''} onclick="(${onPage.toString()})(${page+1})"><i class="ri-arrow-right-s-line"></i></button>`;
}

function hidePagination(prefix) {
  const wrap = document.getElementById(prefix+'Pagination');
  if (wrap) wrap.style.display = 'none';
}

function setLoading(tbodyId, cols) {
  const el = document.getElementById(tbodyId);
  if (el) el.innerHTML = `<tr><td colspan="${cols}"><div class="state-box"><div class="spinner"></div><p>Loading…</p></div></td></tr>`;
}

function setEmpty(tbodyId, cols, msg) {
  const el = document.getElementById(tbodyId);
  if (el) el.innerHTML = `<tr><td colspan="${cols}"><div class="state-box"><i class="ri-inbox-line"></i><p>${msg}</p></div></td></tr>`;
}

function setError(tbodyId, cols, msg) {
  const el = document.getElementById(tbodyId);
  if (el) el.innerHTML = `<tr><td colspan="${cols}"><div class="state-box"><i class="ri-error-warning-line" style="color:var(--danger)"></i><p>${msg}</p></div></td></tr>`;
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

let _toastWrap = null;

  const t = document.createElement('div');
  t.style.cssText = `
    background:${colors[type]||'#4318ff'};color:#fff;
    padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
    animation:toastIn 0.22s ease;
    pointer-events:auto;
  `;
  t.textContent = msg;
  _toastWrap.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

const style = document.createElement('style');
style.textContent = `@keyframes toastIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }`;
document.head.appendChild(style);
</script>
</body>
</html>
