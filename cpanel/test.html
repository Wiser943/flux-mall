<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shares & Investments — Flux Mall Admin</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
/* ── FLUX MALL TOKENS ──────────────────────────────────────── */
:root {
  --primary:      #4318ff;
  --primary-soft: rgba(67,24,255,0.10);
  --accent:       #868cff;
  --success:      #05cd99;
  --success-soft: rgba(5,205,153,0.12);
  --danger:       #ee5d50;
  --danger-soft:  rgba(238,93,80,0.12);
  --warning:      #f6ad55;
  --warning-soft: rgba(246,173,85,0.12);
  --bg:           #f4f7fe;
  --card:         #ffffff;
  --border:       #e0e5f2;
  --text1:        #1b2559;
  --text2:        #4a5568;
  --text3:        #a3adc2;
  --shadow:       0 4px 24px rgba(67,24,255,0.08);
  --shadow-sm:    0 2px 8px rgba(0,0,0,0.06);
  --radius:       16px;
  --radius-sm:    10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans','Segoe UI',sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }

/* ── PAGE ──────────────────────────────────────────────────── */
.page { max-width: 1000px; margin: 0 auto; padding: 20px 16px 80px; }

/* ── HEADER ────────────────────────────────────────────────── */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; flex-wrap:wrap; }
.page-header h1 { font-size:20px; font-weight:800; color:var(--text1); }
.page-header .sub { font-size:12px; color:var(--text3); margin-top:2px; }
.header-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* ── STAT STRIP ────────────────────────────────────────────── */
.stat-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.stat-card { background:var(--card); border-radius:var(--radius-sm); padding:14px; box-shadow:var(--shadow-sm); border:1px solid var(--border); position:relative; overflow:hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:3px 3px 0 0; }
.stat-card.blue::before  { background:var(--primary); }
.stat-card.green::before { background:var(--success); }
.stat-card.orange::before{ background:var(--warning); }
.stat-card.red::before   { background:var(--danger); }
.stat-val   { font-size:18px; font-weight:800; color:var(--text1); line-height:1.1; margin-bottom:4px; }
.stat-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text3); }
.stat-icon  { position:absolute; top:12px; right:12px; font-size:22px; opacity:0.15; }

/* ── TABS ──────────────────────────────────────────────────── */
.tabs-wrap { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; }
.tabs-header { display:flex; border-bottom:1px solid var(--border); background:var(--bg); padding:6px 6px 0; gap:4px; }
.tab-btn { flex:1; padding:10px 6px; border:none; background:transparent; font-size:13px; font-weight:600; color:var(--text3); cursor:pointer; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.15s; }
.tab-btn.active { background:var(--card); color:var(--primary); box-shadow:0 -2px 0 var(--primary) inset; }
.tab-count { background:var(--primary-soft); color:var(--primary); font-size:10px; font-weight:700; padding:1px 6px; border-radius:20px; }
.tab-btn.active .tab-count { background:var(--primary); color:#fff; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── TOOLBAR ───────────────────────────────────────────────── */
.toolbar { display:flex; align-items:center; gap:8px; padding:14px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.search-box { flex:1; min-width:160px; display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:8px 12px; }
.search-box i { color:var(--text3); font-size:15px; }
.search-box input { border:none; background:transparent; font-size:13px; color:var(--text1); outline:none; width:100%; }
.filter-select { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:8px 10px; font-size:12px; color:var(--text2); outline:none; cursor:pointer; }

/* ── SHARE CATALOG GRID ────────────────────────────────────── */
.shares-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; padding:16px; }
.share-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow-sm); transition:transform 0.15s, box-shadow 0.15s; }
.share-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.share-img { width:100%; height:120px; object-fit:cover; background:linear-gradient(135deg,var(--primary-soft),rgba(134,140,255,0.15)); display:flex; align-items:center; justify-content:center; font-size:40px; }
.share-img img { width:100%; height:100%; object-fit:cover; }
.share-body { padding:12px 14px; }
.share-name { font-size:14px; font-weight:800; color:var(--text1); margin-bottom:8px; }
.share-stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
.share-stat { background:var(--bg); border-radius:8px; padding:6px 8px; }
.share-stat label { font-size:10px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:2px; }
.share-stat span { font-size:13px; font-weight:700; color:var(--text1); }
.share-stat span.green { color:var(--success); }
.share-stat span.blue  { color:var(--primary); }
.share-actions { display:flex; gap:6px; }
.duration-pill { display:inline-flex; align-items:center; gap:4px; background:var(--primary-soft); color:var(--primary); border-radius:20px; padding:3px 9px; font-size:11px; font-weight:700; margin-bottom:8px; }

/* ── TABLE ─────────────────────────────────────────────────── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { padding:10px 14px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--text3); border-bottom:1px solid var(--border); white-space:nowrap; background:var(--bg); }
tbody tr { border-bottom:1px solid var(--border); transition:background 0.12s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:rgba(67,24,255,0.02); }
tbody td { padding:11px 14px; vertical-align:middle; }

/* ── BADGES ────────────────────────────────────────────────── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
.badge.success { background:var(--success-soft); color:var(--success); }
.badge.active  { background:var(--success-soft); color:var(--success); }
.badge.pending { background:var(--warning-soft); color:var(--warning); }
.badge.expired { background:rgba(0,0,0,0.06); color:var(--text3); }
.badge.blue    { background:var(--primary-soft); color:var(--primary); }

/* ── BUTTONS ───────────────────────────────────────────────── */
.btn { display:inline-flex; align-items:center; gap:5px; padding:7px 13px; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:#3410d9; }
.btn-success { background:var(--success-soft); color:var(--success); }
.btn-success:hover { background:var(--success); color:#fff; }
.btn-danger  { background:var(--danger-soft); color:var(--danger); }
.btn-danger:hover  { background:var(--danger); color:#fff; }
.btn-ghost   { background:transparent; color:var(--text3); border:1px solid var(--border); }
.btn-ghost:hover   { background:var(--bg); color:var(--text2); }
.btn-warning { background:var(--warning-soft); color:var(--warning); }
.btn-warning:hover { background:var(--warning); color:#fff; }
.btn-sm { padding:5px 9px; font-size:11px; }
.action-group { display:flex; gap:5px; align-items:center; }

/* ── USER CHIP ─────────────────────────────────────────────── */
.user-chip { display:flex; align-items:center; gap:8px; }
.avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; flex-shrink:0; }
.username { font-size:12px; font-weight:600; color:var(--text1); }
.user-sub { font-size:10px; color:var(--text3); }

/* ── PROGRESS ──────────────────────────────────────────────── */
.progress-bar { height:5px; background:var(--border); border-radius:4px; overflow:hidden; margin-top:4px; }
.progress-fill { height:100%; border-radius:4px; background:var(--primary); transition:width 0.3s; }
.progress-fill.green { background:var(--success); }

/* ── EMPTY / LOADING ───────────────────────────────────────── */
.state-box { text-align:center; padding:50px 20px; color:var(--text3); }
.state-box i { font-size:36px; opacity:0.4; display:block; margin-bottom:10px; }
.state-box p { font-size:13px; }
.spinner { width:26px; height:26px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── MODAL ─────────────────────────────────────────────────── */
.modal-overlay { position:fixed; inset:0; background:rgba(17,24,39,0.6); backdrop-filter:blur(4px); display:flex; align-items:flex-end; justify-content:center; z-index:9999; animation:fadeIn 0.18s ease; }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
.modal-sheet { background:var(--card); border-radius:20px 20px 0 0; width:100%; max-width:520px; padding:0 0 32px; animation:slideUp 0.22s cubic-bezier(0.34,1.56,0.64,1); max-height:92vh; overflow-y:auto; }
@keyframes slideUp { from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1} }
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:4px; margin:12px auto 0; }
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; border-bottom:1px solid var(--border); }
.modal-head h3 { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; color:var(--text3); cursor:pointer; }
.modal-body { padding:18px 20px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text3); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:10px;
  font-size:13px; color:var(--text1); background:var(--bg); outline:none; transition:border 0.15s;
}
.form-group input:focus, .form-group select:focus { border-color:var(--primary); background:#fff; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.modal-footer { display:flex; gap:8px; padding:0 20px; }
.modal-footer .btn { flex:1; justify-content:center; }

/* ── PAGINATION ────────────────────────────────────────────── */
.pagination { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-top:1px solid var(--border); font-size:12px; color:var(--text3); flex-wrap:wrap; gap:8px; }
.page-btns { display:flex; gap:4px; }
.page-btns button { width:28px; height:28px; border:1px solid var(--border); border-radius:6px; background:var(--card); font-size:12px; cursor:pointer; color:var(--text2); font-weight:600; transition:all 0.12s; }
.page-btns button.active,.page-btns button:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
.page-btns button:disabled { opacity:0.4; pointer-events:none; }

/* ── RESPONSIVE ────────────────────────────────────────────── */
@media(max-width:600px){
  .stat-strip { grid-template-columns:repeat(2,1fr); }
  .shares-grid { grid-template-columns:1fr; }
  thead th:nth-child(4),tbody td:nth-child(4),
  thead th:nth-child(5),tbody td:nth-child(5) { display:none; }
}
@media(max-width:400px){
  .tab-btn span { display:none; }
}
</style>
</head>
<body>
<div class="page">

  <!-- ── PAGE HEADER ──────────────────────────────────────── -->
  <div class="page-header">
    <div>
      <h1><i class="ri-stock-line" style="color:var(--primary);margin-right:6px;"></i>Shares & Investments</h1>
      <div class="sub">Manage share catalog · Track user investments</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()"><i class="ri-refresh-line"></i> Refresh</button>
      <button class="btn btn-primary btn-sm" onclick="openAddShareModal()"><i class="ri-add-line"></i> New Share</button>
    </div>
  </div>

  <!-- ── STAT STRIP ──────────────────────────────────────── -->
  <div class="stat-strip">
    <div class="stat-card blue">
      <div class="stat-val" id="statTotalShares">—</div>
      <div class="stat-label">Share Packages</div>
      <i class="ri-stack-line stat-icon"></i>
    </div>
    <div class="stat-card green">
      <div class="stat-val" id="statActiveInvestments">—</div>
      <div class="stat-label">Active Investments</div>
      <i class="ri-line-chart-line stat-icon"></i>
    </div>
    <div class="stat-card orange">
      <div class="stat-val" id="statTotalInvested">—</div>
      <div class="stat-label">Total Invested (FEX)</div>
      <i class="ri-coin-line stat-icon"></i>
    </div>
    <div class="stat-card red">
      <div class="stat-val" id="statExpired">—</div>
      <div class="stat-label">Expired</div>
      <i class="ri-time-line stat-icon"></i>
    </div>
  </div>

  <!-- ── TABS ─────────────────────────────────────────────── -->
  <div class="tabs-wrap">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="switchTab('catalog',this)">
        <i class="ri-layout-grid-line"></i><span>Share Catalog</span>
        <span class="tab-count" id="tcCatalog">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('investments',this)">
        <i class="ri-user-star-line"></i><span>User Investments</span>
        <span class="tab-count" id="tcInvestments">0</span>
      </button>
    </div>

    <!-- ══ CATALOG TAB ═════════════════════════════════════ -->
    <div class="tab-panel active" id="panel-catalog">
      <div class="toolbar">
        <div class="search-box">
          <i class="ri-search-line"></i>
          <input type="text" placeholder="Search share name…" oninput="filterCatalog(this.value)">
        </div>
        <select class="filter-select" onchange="sortCatalog(this.value)">
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="duration-asc">Duration: Short → Long</option>
          <option value="name-asc">Name: A → Z</option>
        </select>
      </div>

      <!-- Share cards grid -->
      <div id="sharesGrid" class="shares-grid">
        <div class="state-box" style="grid-column:1/-1">
          <div class="spinner"></div><p>Loading shares…</p>
        </div>
      </div>
    </div>

    <!-- ══ INVESTMENTS TAB ══════════════════════════════════ -->
    <div class="tab-panel" id="panel-investments">
      <div class="toolbar">
        <div class="search-box">
          <i class="ri-search-line"></i>
          <input type="text" placeholder="Search user or share name…" oninput="filterInvestments(this.value)">
        </div>
        <select class="filter-select" onchange="filterInvestmentStatus(this.value)">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="expired">Expired</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Share Package</th>
              <th>Progress</th>
              <th>Daily Income</th>
              <th>Purchased</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="investmentsTableBody">
            <tr><td colspan="7"><div class="state-box"><div class="spinner"></div><p>Loading…</p></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="investPagination" style="display:none;">
        <span id="investPageInfo"></span>
        <div class="page-btns" id="investPageBtns"></div>
      </div>
    </div>

  </div><!-- /tabs-wrap -->
</div><!-- /page -->

<!-- ── MODAL MOUNT ──────────────────────────────────────── -->
<div id="__modal"></div>

<!-- ══════════════════════════════════════════════════════════
     SCRIPT
═══════════════════════════════════════════════════════════ -->
<script>
// ── STATE ──────────────────────────────────────────────────
let _shares      = [];   // share catalog
let _investments = [];   // all purchased shares across all users
let _invFiltered = [];
const INV_PER_PAGE = 15;
let invPage = 1;

const AVATAR_COLORS = ['#4318ff','#05cd99','#ee5d50','#f6ad55','#4299e1','#9f7aea','#ed64a6','#38b2ac'];
function avatarColor(str){ let h=0; for(let i=0;i<(str||'').length;i++) h=str.charCodeAt(i)+((h<<5)-h); return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
function initials(s){ return (s||'?').slice(0,2).toUpperCase(); }

// ── API ─────────────────────────────────────────────────────
async function api(path, opts={}) {
  try {
    const res = await fetch(path, {
      credentials:'include',
      headers:{ 'Content-Type':'application/json', ...opts.headers },
      ...opts
    });
    return res.json();
  } catch(e) { console.error('[API]',e); return null; }
}

// ── TAB SWITCH ──────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  loadShares();
  loadInvestments();
});

async function refreshAll() {
  loadShares();
  loadInvestments();
  showToast('Refreshed ✓','success');
}

// ═══════════════════════════════════════════════════════════
// SHARE CATALOG
// ═══════════════════════════════════════════════════════════
async function loadShares() {
  document.getElementById('sharesGrid').innerHTML =
    `<div class="state-box" style="grid-column:1/-1"><div class="spinner"></div><p>Loading…</p></div>`;

  const data = await api('/api/admin/shares');
  _shares = data?.shares || [];
  setText('statTotalShares', _shares.length);
  setText('tcCatalog', _shares.length);
  renderCatalog(_shares);
}

let _catalogFiltered = [];
let _catalogSort = 'price-asc';

function filterCatalog(term) {
  term = term.toLowerCase();
  _catalogFiltered = _shares.filter(s => s.name.toLowerCase().includes(term));
  applyCatalogSort();
}

function sortCatalog(val) {
  _catalogSort = val;
  applyCatalogSort();
}

function applyCatalogSort() {
  const arr = _catalogFiltered.length ? _catalogFiltered : [..._shares];
  arr.sort((a,b) => {
    if (_catalogSort === 'price-asc')     return a.price - b.price;
    if (_catalogSort === 'price-desc')    return b.price - a.price;
    if (_catalogSort === 'duration-asc')  return a.duration - b.duration;
    if (_catalogSort === 'name-asc')      return a.name.localeCompare(b.name);
    return 0;
  });
  renderCatalog(arr);
}

function renderCatalog(shares) {
  const grid = document.getElementById('sharesGrid');
  if (!shares.length) {
    grid.innerHTML = `<div class="state-box" style="grid-column:1/-1">
      <i class="ri-stack-line"></i><p>No share packages yet. Click <strong>+ New Share</strong> to create one.</p>
    </div>`;
    return;
  }

  // Count how many users bought each share
  const buyCount = {};
  _investments.forEach(inv => {
    const key = inv.shareName;
    buyCount[key] = (buyCount[key]||0) + 1;
  });

  grid.innerHTML = shares.map(s => {
    const buyers = buyCount[s.name] || 0;
    const roi    = s.duration > 0 ? ((s.dailyIncome * s.duration / s.price)*100).toFixed(1) : '0';
    const imgHtml = s.img
      ? `<img src="${s.img}" alt="${s.name}" onerror="this.parentElement.innerHTML='📦'">`
      : '📦';

    return `
    <div class="share-card">
      <div class="share-img">${imgHtml}</div>
      <div class="share-body">
        <div class="duration-pill"><i class="ri-calendar-line"></i> ${s.duration} Days</div>
        <div class="share-name">${s.name}</div>
        <div class="share-stats">
          <div class="share-stat">
            <label>Price</label>
            <span class="blue">🪙${Number(s.price).toLocaleString()}</span>
          </div>
          <div class="share-stat">
            <label>Daily Income</label>
            <span class="green">🪙${Number(s.dailyIncome).toLocaleString()}</span>
          </div>
          <div class="share-stat">
            <label>Total ROI</label>
            <span>${roi}%</span>
          </div>
          <div class="share-stat">
            <label>Buyers</label>
            <span>${buyers} user${buyers!==1?'s':''}</span>
          </div>
        </div>
        <div class="share-actions">
          <button class="btn btn-warning btn-sm" style="flex:1" onclick="openEditShareModal('${s._id}')">
            <i class="ri-edit-line"></i> Edit
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteShare('${s._id}','${s.name}')">
            <i class="ri-delete-bin-line"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// USER INVESTMENTS (Purchased Shares)
// ═══════════════════════════════════════════════════════════
async function loadInvestments() {
  setLoading('investmentsTableBody', 7);
  // Uses the admin purchased-shares endpoint
  const data = await api('/api/admin/purchased-shares');
  _investments = data?.investments || data?.purchasedShares || [];
  _invFiltered = [..._investments];

  // Update stats
  const active  = _investments.filter(i => !isExpired(i)).length;
  const expired = _investments.filter(i =>  isExpired(i)).length;
  const totalFex = _investments.reduce((s,i) => s + Number(i.pricePaid||0), 0);

  setText('statActiveInvestments', active);
  setText('statExpired', expired);
  setText('statTotalInvested', '🪙'+totalFex.toLocaleString());
  setText('tcInvestments', _investments.length);

  renderInvestmentsPage();
  // Re-render catalog to update buyer counts
  renderCatalog(_shares);
}

function isExpired(inv) {
  if (!inv.purchaseDate) return false;
  const daysPassed = Math.floor((Date.now() - new Date(inv.purchaseDate)) / 86400000);
  return daysPassed >= (inv.duration || 0);
}

function daysLeft(inv) {
  const daysPassed = Math.floor((Date.now() - new Date(inv.purchaseDate)) / 86400000);
  return Math.max(0, (inv.duration||0) - daysPassed);
}

function progressPct(inv) {
  const daysPassed = Math.floor((Date.now() - new Date(inv.purchaseDate)) / 86400000);
  return Math.min(100, Math.round((daysPassed / (inv.duration||1)) * 100));
}

function filterInvestments(term) {
  term = term.toLowerCase();
  const statusSel = document.querySelector('#panel-investments .filter-select')?.value || 'all';
  applyInvestmentFilters(term, statusSel);
}

function filterInvestmentStatus(status) {
  const term = document.querySelector('#panel-investments .search-box input')?.value.toLowerCase() || '';
  applyInvestmentFilters(term, status);
}

function applyInvestmentFilters(term, status) {
  _invFiltered = _investments.filter(inv => {
    const name   = (inv.userId?.username || inv.username || '').toLowerCase();
    const share  = (inv.shareName || '').toLowerCase();
    const matchQ = !term || name.includes(term) || share.includes(term);
    const matchS = status === 'all' || (status === 'active' ? !isExpired(inv) : isExpired(inv));
    return matchQ && matchS;
  });
  invPage = 1;
  renderInvestmentsPage();
}

function renderInvestmentsPage() {
  const tbody = document.getElementById('investmentsTableBody');
  if (!_invFiltered.length) { setEmpty('investmentsTableBody',7,'No investments found'); hidePagination('invest'); return; }

  const slice = paginate(_invFiltered, invPage, INV_PER_PAGE);
  tbody.innerHTML = slice.map(inv => {
    const username = inv.userId?.username || inv.username || '—';
    const email    = inv.userId?.email    || '—';
    const pct      = progressPct(inv);
    const left     = daysLeft(inv);
    const expired  = isExpired(inv);
    const date     = inv.purchaseDate
      ? new Date(inv.purchaseDate).toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'})
      : '—';
    const earned   = Math.floor((inv.duration - left) * (inv.dailyIncome||0));

    return `<tr>
      <td>
        <div class="user-chip">
          <div class="avatar" style="background:${avatarColor(username)}">${initials(username)}</div>
          <div>
            <div class="username">${username}</div>
            <div class="user-sub">${email}</div>
          </div>
        </div>
      </td>
      <td>
        <div style="font-weight:700;font-size:13px;">${inv.shareName || '—'}</div>
        <div style="font-size:11px;color:var(--text3);">🪙${Number(inv.pricePaid||0).toLocaleString()} paid</div>
      </td>
      <td style="min-width:120px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:3px;">
          <span>${pct}%</span>
          <span>${expired ? 'Done' : left+' days left'}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${expired?'':'green'}" style="width:${pct}%;background:${expired?'var(--text3)':'var(--success)'}"></div>
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px;">🪙${earned.toLocaleString()} earned</div>
      </td>
      <td>
        <div style="font-weight:700;color:var(--success);font-size:13px;">🪙${Number(inv.dailyIncome||0).toLocaleString()}/day</div>
        <div style="font-size:11px;color:var(--text3);">${inv.duration} days total</div>
      </td>
      <td style="white-space:nowrap;font-size:12px;color:var(--text3);">${date}</td>
      <td>
        ${expired
          ? `<span class="badge expired">⬛ Expired</span>`
          : `<span class="badge active">🟢 Active</span>`}
      </td>
      <td>
        <div class="action-group">
          <button class="btn btn-ghost btn-sm" onclick="viewInvestmentDetail(${JSON.stringify(inv).replace(/"/g,'&quot;')})">
            <i class="ri-eye-line"></i>
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteInvestment('${inv._id}','${username}')">
            <i class="ri-delete-bin-line"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  renderPagination('invest', _invFiltered.length, invPage, (p)=>{ invPage=p; renderInvestmentsPage(); });
}

function openAddShareModal() {
  showModal(`

    </div>

      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (FEX)</label>
          <input type="number" id="ms_price" placeholder="5000" min="1">
        </div>
        <div class="form-group">
          <label>Duration (Days)</label>
          <input type="number" id="ms_duration" placeholder="30" min="1">
        </div>
      </div>
      <div class="form-group">

        <input type="number" id="ms_daily" placeholder="200" min="1">
      </div>
      <div class="form-group">

      <div id="ms_roiPreview" style="background:var(--bg);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text2);display:none;">

      </div>

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddShare()"><i class="ri-check-line"></i> Create Share</button>

  `);

  // Live ROI preview
  ['ms_price','ms_daily','ms_duration'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', updateRoiPreview);
  });
}

function updateRoiPreview() {
  const price = Number(document.getElementById('ms_price')?.value)||0;
  const daily = Number(document.getElementById('ms_daily')?.value)||0;
  const dur   = Number(document.getElementById('ms_duration')?.value)||0;
  const prev  = document.getElementById('ms_roiPreview');
  const text  = document.getElementById('ms_roiText');
  if (price && daily && dur) {
    const total = daily * dur;
    const roi   = ((total / price)*100).toFixed(1);
    text.textContent = `Total return: 🪙${total.toLocaleString()} FEX (${roi}% ROI over ${dur} days)`;
    prev.style.display = 'block';
  } else {
    prev.style.display = 'none';
  }
}

async function submitAddShare() {
  const g   = id => document.getElementById(id)?.value;
  const name = g('ms_name')?.trim();
  const price    = Number(g('ms_price'));
  const daily    = Number(g('ms_daily'));
  const duration = Number(g('ms_duration'));
  if (!name || !price || !daily || !duration) { showToast('Please fill all fields','error'); return; }

  let imgUrl = g('ms_imgUrl');
  const fileInput = document.getElementById('ms_imgFile');
  if (fileInput?.files[0]) {
    const statusEl = document.getElementById('ms_imgStatus');
    imgUrl = await uploadToImgBB(fileInput.files[0], statusEl);
    if (!imgUrl) return;
  }

  const res = await api('/api/admin/shares', {
    method:'POST',
    body: JSON.stringify({ name, price, dailyIncome: daily, duration, img: imgUrl||'' })
  });

  if (res?.success) {
    showToast(`✅ "${name}" share created!`,'success');
    closeModal();
    loadShares();
  } else {
    showToast(res?.error || 'Error creating share','error');
  }
}

function openEditShareModal(id) {
  const s = _shares.find(x => x._id === id);
  if (!s) return;

  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h3><i class="ri-edit-line" style="color:var(--warning)"></i> Edit Share Package</h3>
      <button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
    </div>

      <div class="form-row">

        </div>

          <label>Duration (Days)</label>

}

async function submitEditShare(id) {
  const g = id => document.getElementById(id)?.value;
  const payload = {
    name:        g('es_name')?.trim(),
    price:       Number(g('es_price')),
    dailyIncome: Number(g('es_daily')),
    duration:    Number(g('es_duration')),
    img:         g('es_img')?.trim() || '',
  };
  if (!payload.name || !payload.price) { showToast('Name and price required','error'); return; }

  const res = await api(`/api/admin/shares/${id}`, {
    method:'PUT',
    body: JSON.stringify(payload)
  });

  if (res?.success) {
    showToast('Share updated!','success');
    closeModal();
    loadShares();
  } else {
    showToast(res?.error||'Error updating share','error');
  }
}

async function deleteShare(id, name) {
  if (!confirm(`Delete "${name}"? Users who already bought it keep their investment.`)) return;
  const res = await api(`/api/admin/shares/${id}`, { method:'DELETE' });
  if (res?.success) {
    showToast(`"${name}" deleted`,'warning');
    loadShares();
  } else {
    showToast(res?.error||'Error deleting share','error');
  }
}

// ═══════════════════════════════════════════════════════════
// IMGBB UPLOAD (reuses your existing function if available)
// ═══════════════════════════════════════════════════════════
async function uploadToImgBB(file, statusEl) {
  if (statusEl) statusEl.innerHTML = '<i class="ri-loader-line"></i> Uploading image...';
  try {
    const settingsData = await api('/api/admin/settings/apikeys');
    const imgbbKey = settingsData?.apikeys?.imgbb;
    if (!imgbbKey) {
      if (statusEl) statusEl.innerHTML = '';
      showToast('ImgBB API key not set in Settings','error');
      return null;
    }
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method:'POST', body:formData });
    const result = await res.json();
    if (result.success) {
      if (statusEl) statusEl.innerHTML = '✅ Image uploaded';
      return result.data.url;
    } else {
      if (statusEl) statusEl.innerHTML = '';
      showToast('ImgBB upload failed','error');
      return null;
    }
  } catch (err) {
    if (statusEl) statusEl.innerHTML = '';
    showToast('Upload error: '+err.message,'error');
    return null;
  }
}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function paginate(arr, page, per) {
  return arr.slice((page-1)*per, page*per);
}

function renderPagination(prefix, total, page, onPage) {
  const totalPages = Math.ceil(total/INV_PER_PAGE);
  const wrap = document.getElementById(prefix+'Pagination');
  const info = document.getElementById(prefix+'PageInfo');
  const btns = document.getElementById(prefix+'PageBtns');
  if (!wrap) return;
  if (totalPages <= 1) { wrap.style.display='none'; return; }
  wrap.style.display = 'flex';
  const start = (page-1)*INV_PER_PAGE+1;
  const end   = Math.min(page*INV_PER_PAGE, total);
  if (info) info.textContent = `${start}–${end} of ${total}`;

  const range = [];
  let s = Math.max(1,page-2), e = Math.min(totalPages,s+4);
  if (e-s<4) s = Math.max(1,e-4);
  for (let i=s;i<=e;i++) range.push(i);

  btns.innerHTML = `
    <button ${page<=1?'disabled':''} onclick="(${onPage.toString()})(${page-1})"><i class="ri-arrow-left-s-line"></i></button>
    ${range.map(p=>`<button class="${p===page?'active':''}" onclick="(${onPage.toString()})(${p})">${p}</button>`).join('')}
    <button ${page>=totalPages?'disabled':''} onclick="(${onPage.toString()})(${page+1})"><i class="ri-arrow-right-s-line"></i></button>`;
}

function hidePagination(prefix) {
  const el = document.getElementById(prefix+'Pagination');
  if (el) el.style.display = 'none';
}

function setLoading(tbodyId, cols) {
  const el = document.getElementById(tbodyId);
  if (el) el.innerHTML = `<tr><td colspan="${cols}"><div class="state-box"><div class="spinner"></div><p>Loading…</p></div></td></tr>`;
}

function setEmpty(tbodyId, cols, msg) {
  const el = document.getElementById(tbodyId);
  if (el) el.innerHTML = `<tr><td colspan="${cols}"><div class="state-box"><i class="ri-inbox-line"></i><p>${msg}</p></div></td></tr>`;
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

// ── MODAL ──────────────────────────────────────────────────
function showModal(html) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = '__modalOverlay';
  overlay.onclick = e => { if (e.target===overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal-sheet">${html}</div>`;
  document.body.appendChild(overlay);
}
function closeModal() {
  document.getElementById('__modalOverlay')?.remove();
}

// ── TOAST ──────────────────────────────────────────────────
let _tw = null;
function showToast(msg, type='success') {
  if (!_tw) {
    _tw = document.createElement('div');
    _tw.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;';
    document.body.appendChild(_tw);
  }
  const colors = { success:'#05cd99', warning:'#f6ad55', error:'#ee5d50' };
  const t = document.createElement('div');
  t.style.cssText = `background:${colors[type]||'#4318ff'};color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.15);animation:toastIn 0.2s ease;`;
  t.textContent = msg;
  _tw.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}
const s2 = document.createElement('style');
s2.textContent = '@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}';
document.head.appendChild(s2);
</script>
