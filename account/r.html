<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayRoute Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <main class="container">
        <section class="promo-side">
            <div class="logo">PayRoute<span>.online</span></div>
            
            <div class="stats-card">
                <div class="card-header">
                    <span>LIVE FEED</span>
                    <span>100% ENERGY</span>
                </div>
                <p class="label">LIFETIME EARNINGS</p>
                <h1 class="earnings">₦2,850,000</h1>
                <div class="chart-placeholder">
                    <svg viewBox="0 0 100 30"><path d="M0 25 Q 25 25, 50 15 T 100 10" fill="transparent" stroke="#00ff7f" stroke-width="2"/></svg>
                </div>
                <div class="badge-row">
                    <div class="badge">TASKS: 842</div>
                    <div class="badge-gold">RANK: ELITE</div>
                </div>
            </div>

            <div class="promo-text">
                <h2>Unlock Your <br><span>Earning Potential.</span></h2>
                <p>Welcome back to the #1 GPT Platform in Nigeria.</p>
            </div>
        </section>

        <section class="login-side">
            <div class="form-wrapper">
                <div class="lock-icon"><i data-lucide="lock"></i></div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Enter credentials to unlock dashboard.</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label>USERNAME / EMAIL</label>
                        <div class="input-field">
                            <i data-lucide="user"></i>
                            <input type="text" placeholder="wiser943" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="label-row">
                            <label>PASSWORD</label>
                            <a href="#" class="forgot">Forgot?</a>
                        </div>
                        <div class="input-field">
                            <i data-lucide="lock"></i>
                            <input type="password" id="password" placeholder="••••••••••••" required>
                            <i data-lucide="eye" class="toggle-password" onclick="togglePass()"></i>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">LOGIN &rarr;</button>
                </form>

                <p class="footer-link">New to PayRoute? <a href="#">Create Account</a></p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
